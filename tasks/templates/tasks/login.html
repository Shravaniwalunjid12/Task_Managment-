<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - TaskFlow</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <style>
    body{font-family:'Sora',sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
    .login-card{background:#1e293b;border:1px solid #334155;border-radius:20px;padding:40px;width:100%;max-width:420px;}
    .login-logo{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#818cf8);display:flex;align-items:center;justify-content:center;font-size:1.5rem;color:white;margin:0 auto 20px;}
    .form-control{background:#0f172a;border:1px solid #334155;color:#e2e8f0;border-radius:10px;padding:10px 14px;font-family:'Sora',sans-serif;}
    .form-control:focus{background:#0f172a;border-color:#6366f1;color:#e2e8f0;box-shadow:0 0 0 3px rgba(99,102,241,0.15);}
    .form-control::placeholder{color:#475569;}
    .form-label{font-size:0.82rem;color:#94a3b8;font-weight:600;}
    .btn-login{background:linear-gradient(135deg,#6366f1,#818cf8);color:white;border:none;border-radius:10px;padding:12px;font-family:'Sora',sans-serif;font-weight:600;width:100%;font-size:0.95rem;cursor:pointer;}
    .btn-login:hover{opacity:0.88;color:white;}
    .divider{display:flex;align-items:center;gap:10px;margin:22px 0 16px;font-size:0.75rem;color:#475569;}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:#334155;}
    .reg-btn{border-radius:10px;padding:11px;font-family:'Sora',sans-serif;font-weight:600;width:100%;font-size:0.87rem;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;margin-bottom:10px;}
    .reg-admin{background:rgba(251,191,36,0.08);color:#fbbf24;border:2px solid rgba(251,191,36,0.25);}
    .reg-admin:hover{border-color:#fbbf24;color:#fbbf24;background:rgba(251,191,36,0.14);}
    .reg-user{background:transparent;color:#818cf8;border:2px solid #334155;}
    .reg-user:hover{border-color:#6366f1;color:#818cf8;background:rgba(99,102,241,0.07);}
    .alert{border-radius:10px;border:none;font-size:0.85rem;}
    .alert-danger{background:rgba(239,68,68,0.1);color:#f87171;}
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo"><i class="fas fa-bolt"></i></div>
    <h4 class="text-center fw-bold mb-1">TaskFlow</h4>
    <p class="text-center mb-4" style="color:#64748b;font-size:0.85rem;">Sign in to your account</p>

    {% if form.errors %}
    <div class="alert alert-danger mb-3"><i class="fas fa-circle-exclamation me-2"></i>Invalid username or password.</div>
    {% endif %}

    <form method="POST">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <input type="password" name="password" class="form-control" placeholder="Enter password" required>
      </div>
      <button type="submit" class="btn-login"><i class="fas fa-right-to-bracket me-2"></i>Sign In</button>
    </form>

    <div class="divider">New to TaskFlow? Create account as</div>
    <a href="{% url 'register' %}?role=admin" class="reg-btn reg-admin">
      <i class="fas fa-crown"></i> Admin &mdash; Full system access
    </a>
    <a href="{% url 'register' %}?role=user" class="reg-btn reg-user">
      <i class="fas fa-user"></i> User &mdash; View assigned tasks
    </a>
    <p class="text-center mt-4" style="font-size:0.78rem;color:#475569;">TaskFlow &mdash; Task Assignment Management System</p>
  </div>
</body>
</html>
